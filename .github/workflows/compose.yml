---
name: Validate compose

on:
  workflow_run:
    workflows: ["Build and push image"]
    types:
      - completed

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v6

      - name: Generate dummy .env
        run: cp .env.example .env && sed -i 's/SECRET_KEY=.*/SECRET_KEY=dummydummydummydummydummydummydummydummydummydummy/' .env

      - name: Validate compose config
        run: docker compose config --quiet

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Confirm image is accessible on GHCR
        run: docker compose pull netbox
